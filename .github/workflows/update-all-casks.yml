name: Update All Casks

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-casks:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cask: "machstruct"
          - cask: "voicebox"
          - cask: "atoll"
          - cask: "mtarsier"

    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Bump ${{ matrix.cask }} cask
        uses: Homebrew/actions/bump-packages@main
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          casks: ${{ matrix.cask }}