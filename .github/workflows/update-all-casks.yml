name: Update All Casks

on:
  schedule:
    - cron: "0 6 * * *" # Каждый день в 6 утра UTC
  workflow_dispatch:   # Кнопка ручного запуска

jobs:
  update-casks:
    runs-on: macos-latest # Обязательно macOS для работы brew
    strategy:
      fail-fast: false
      matrix:
        include:
          - cask: "machstruct"
          # - cask: "tool"

    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Bump ${{ matrix.cask }} cask
        uses: Homebrew/actions/bump-packages@master
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          casks: ${{ matrix.cask }}